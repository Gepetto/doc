name: "CI - Nix"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: gepetto
          # authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}' # don't polute our limited cache
          extraPullNames: ros
      - run: nix flake check -L
      - run: nix build -L .#gepetto-doc
      - run: mkdir doc
      - run: cp -r result/* doc
      - uses: actions/upload-pages-artifact@v4
        with:
          path: doc/
  deploy:
    if: github.repository == 'gepetto/doc' && github.ref == 'refs/heads/main'
    runs-on: "ubuntu-latest"
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  check:
    if: always()
    name: check-macos-linux-nix
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
